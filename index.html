<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>双人私聊室 · 环信版</title>
  <!-- 环信 Web SDK（国内节点，非常稳定） -->
  <script src="https://download-sdk.oss-cn-beijing.aliyuncs.com/downloads/easemob-chat-web-4.10.3-alpha.2.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif; }
    body { background:#f5f7fb; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:12px; }
    .chat-container { width:100%; max-width:700px; height:90vh; min-height:600px; background:white; border-radius:28px; box-shadow:0 20px 40px rgba(0,0,0,0.08), 0 6px 12px rgba(0,0,0,0.05); display:flex; flex-direction:column; overflow:hidden; border:1px solid rgba(255,255,255,0.5); }
    .chat-header { padding:16px 20px; background:white; border-bottom:1px solid #f0f2f6; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; }
    .room-info { display:flex; align-items:center; gap:10px; }
    .room-badge { background:#eef2ff; color:#4f46e5; padding:6px 14px; border-radius:40px; font-size:0.9rem; font-weight:500; display:flex; align-items:center; gap:6px; }
    .online-dot { width:10px; height:10px; border-radius:10px; background:#10b981; box-shadow:0 0 0 2px rgba(16,185,129,0.2); }
    .user-controls { display:flex; gap:8px; flex-wrap:wrap; }
    .nickname-input, .room-input { border:1px solid #e2e8f0; border-radius:30px; padding:8px 14px; font-size:0.85rem; background:white; outline:none; transition:border 0.15s; width:120px; }
    .nickname-input:focus, .room-input:focus { border-color:#4f46e5; }
    .btn { background:#4f46e5; color:white; border:none; border-radius:40px; padding:8px 18px; font-size:0.85rem; font-weight:500; cursor:pointer; transition:background 0.15s, transform 0.1s; display:inline-flex; align-items:center; gap:6px; box-shadow:0 4px 6px rgba(79,70,229,0.15); }
    .btn:hover { background:#4338ca; }
    .btn-outline { background:white; color:#1e293b; box-shadow:none; border:1px solid #e2e8f0; }
    .btn-outline:hover { background:#f8fafc; }
    .btn-clear { background:#f1f5f9; color:#475569; box-shadow:none; }
    .btn-clear:hover { background:#e2e8f0; }
    .messages-area { flex:1; overflow-y:auto; padding:20px 16px; background:#fafbff; display:flex; flex-direction:column; gap:12px; scroll-behavior:smooth; }
    .message-row { display:flex; flex-direction:column; }
    .message-meta { display:flex; align-items:baseline; gap:8px; margin-bottom:4px; padding:0 8px; }
    .message-sender { font-weight:600; font-size:0.9rem; color:#1e293b; }
    .message-time { font-size:0.7rem; color:#64748b; }
    .message-bubble { max-width:80%; padding:10px 16px; border-radius:22px; word-break:break-word; background:white; box-shadow:0 2px 6px rgba(0,0,0,0.02); border:1px solid #edf2f7; line-height:1.5; font-size:0.95rem; color:#0f172a; }
    .message-row.self { align-items:flex-end; }
    .message-row.self .message-bubble { background:#4f46e5; color:white; border:none; }
    .message-row.self .message-sender { color:#4f46e5; }
    .message-image { max-width:240px; max-height:240px; border-radius:18px; margin-top:6px; border:1px solid rgba(0,0,0,0.05); cursor:pointer; transition:transform 0.1s; }
    .message-image:hover { transform:scale(1.02); }
    .system-message { text-align:center; color:#64748b; font-size:0.8rem; margin:8px 0; }
    .chat-footer { padding:14px 18px; background:white; border-top:1px solid #f0f2f6; display:flex; align-items:center; gap:10px; }
    .input-wrapper { flex:1; display:flex; align-items:center; background:#f8fafc; border-radius:40px; padding:4px 6px 4px 18px; border:1px solid #e2e8f0; transition:border 0.15s; }
    .input-wrapper:focus-within { border-color:#4f46e5; background:white; }
    .message-input { flex:1; border:none; background:transparent; padding:12px 6px 12px 0; font-size:0.95rem; outline:none; }
    .photo-label { display:flex; align-items:center; justify-content:center; padding:8px 10px; cursor:pointer; color:#64748b; border-radius:40px; transition:background 0.15s; }
    .photo-label:hover { background:#eef2ff; color:#4f46e5; }
    .photo-label svg { width:24px; height:24px; }
    #imageInput { display:none; }
    .send-btn { background:#4f46e5; border:none; border-radius:40px; width:48px; height:48px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:0.15s; color:white; box-shadow:0 4px 8px rgba(79,70,229,0.2); }
    .send-btn:hover { background:#4338ca; }
    .send-btn svg { width:22px; height:22px; }
    .empty-state { text-align:center; color:#94a3b8; margin-top:40px; }
    .status-indicator { font-size:0.8rem; color:#64748b; margin-left:8px; }
    @media (max-width:500px) { .chat-container { height:95vh; } .nickname-input, .room-input { width:100px; } }
  </style>
</head>
<body>
<div class="chat-container">
  <div class="chat-header">
    <div class="room-info">
      <div class="room-badge">
        <span class="online-dot" id="connectionDot"></span>
        <span id="currentRoomDisplay">私聊房间</span>
      </div>
      <span class="status-indicator" id="connectionStatus">连接中...</span>
    </div>
    <div class="user-controls">
      <input type="text" id="nicknameInput" class="nickname-input" placeholder="你的名字" maxlength="16" value="我">
      <input type="text" id="roomInput" class="room-input" placeholder="房间号" maxlength="20" value="cozy-room">
      <button class="btn btn-outline" id="joinRoomBtn" title="加入房间">🚪 加入</button>
      <button class="btn btn-clear" id="clearStorageBtn" title="清除本地聊天记录">🧹 清记录</button>
    </div>
  </div>

  <div class="messages-area" id="messagesArea">
    <div class="empty-state">
      ✨ 输入昵称和房间号，点击「加入」开始私聊<br>
      <span style="font-size:0.8rem;">对方只需打开链接，无需任何操作</span>
    </div>
  </div>

  <div class="chat-footer">
    <div class="input-wrapper">
      <input type="text" id="messageInput" class="message-input" placeholder="输入消息..." autocomplete="off" />
      <label class="photo-label" for="imageInput" title="发送照片">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="4" ry="4"></rect>
          <circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"></circle>
          <polyline points="21 15 16 10 5 21"></polyline>
        </svg>
      </label>
      <input type="file" id="imageInput" accept="image/png, image/jpeg, image/gif, image/webp">
    </div>
    <button class="send-btn" id="sendBtn" title="发送消息">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>

<script>
  (function(){
    "use strict";

    // ⚙️ 配置区：替换为你自己的环信 AppKey
    const EASEMOB_APP_KEY = '1179260424193615#chat-room';  // 👈 去 console.easemob.com 创建应用获取

    const STORAGE_KEY_PREFIX = 'chat_easemob_';
    let currentUser = { nickname:'我', room:'cozy-room' };
    let messages = [];
    let conn = null;
    let isConnected = false;

    const messagesArea = document.getElementById('messagesArea');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const nicknameInput = document.getElementById('nicknameInput');
    const roomInput = document.getElementById('roomInput');
    const joinRoomBtn = document.getElementById('joinRoomBtn');
    const currentRoomDisplay = document.getElementById('currentRoomDisplay');
    const imageInput = document.getElementById('imageInput');
    const clearStorageBtn = document.getElementById('clearStorageBtn');
    const connectionDot = document.getElementById('connectionDot');
    const connectionStatus = document.getElementById('connectionStatus');

    // ---------- 工具函数 ----------
    function escapeHtml(str) {
      if (str == null) return '';
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
    }

    function getStorageKey(room) { return STORAGE_KEY_PREFIX + room.trim(); }

    function loadMessagesFromStorage(room) {
      const key = getStorageKey(room);
      try {
        const stored = localStorage.getItem(key);
        messages = stored ? JSON.parse(stored).filter(m=>m&&m.id&&m.content!==undefined) : [];
      } catch(e) { messages = []; localStorage.removeItem(key); }
    }

    function saveMessagesToStorage() {
      try { localStorage.setItem(getStorageKey(currentUser.room), JSON.stringify(messages)); } catch(e){}
    }

    function addMessage(msgData, skipSave) {
      const clean = {
        id: msgData.id || (Date.now()+'-'+Math.random().toString(36)),
        sender: String(msgData.sender||'匿名').substring(0,30),
        content: String(msgData.content||''),
        type: (msgData.type==='image'||msgData.type==='system')?msgData.type:'text',
        timestamp: msgData.timestamp || Date.now(),
        text: msgData.text ? String(msgData.text) : undefined
      };
      messages.push(clean);
      if(messages.length>500) messages=messages.slice(-500);
      if(!skipSave) saveMessagesToStorage();
      renderMessages();
    }

    function formatTime(ts) {
      const d = new Date(ts);
      return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
    }

    function renderMessages() {
      if(!messages.length) {
        messagesArea.innerHTML = '<div class="empty-state">💬 还没有消息，说点什么吧～</div>'; return;
      }
      let html = '';
      for(const m of messages){
        if(m.type==='system') { html += `<div class="system-message">${escapeHtml(m.content)}</div>`; continue; }
        const isSelf = m.sender === currentUser.nickname;
        html += `<div class="message-row ${isSelf?'self':''}">
          <div class="message-meta"><span class="message-sender">${escapeHtml(m.sender)}</span><span class="message-time">${formatTime(m.timestamp)}</span></div>
          <div class="message-bubble">${m.type==='image'?`<img src="${escapeHtml(m.content)}" class="message-image" onclick="window.open(this.src)"/>${m.text?'<div style="margin-top:6px;">'+escapeHtml(m.text)+'</div>':''}`:escapeHtml(m.content)}</div>
        </div>`;
      }
      messagesArea.innerHTML = html;
      messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    function updateConnectionUI() {
      if(isConnected) {
        connectionDot.style.background='#10b981'; connectionDot.style.boxShadow='0 0 0 2px rgba(16,185,129,0.2)';
        connectionStatus.textContent='已连接'; connectionStatus.style.color='#10b981';
      } else {
        connectionDot.style.background='#ef4444'; connectionDot.style.boxShadow='0 0 0 2px rgba(239,68,68,0.2)';
        connectionStatus.textContent='未连接'; connectionStatus.style.color='#ef4444';
      }
    }

    function addSystemMessage(text) {
      addMessage({ id:'sys-'+Date.now(), sender:'系统', content:text, type:'system', timestamp:Date.now() });
    }

    // ---------- 环信连接 ----------
    function connectEasemob() {
      if(!EASEMOB_APP_KEY || EASEMOB_APP_KEY==='你的环信AppKey') {
        addSystemMessage('❌ 请设置环信 AppKey');
        return;
      }

      const username = 'user_' + Date.now(); // 每次随机用户名
      const password = '1'; // 环信测试环境弱密码

      conn = new window.easemobIm.connection({
        appKey: EASEMOB_APP_KEY,
        https: true,
        url: 'wss://im-api.easemob.com/websocket',
        apiUrl: 'https://a1.easemob.com',
        delivery: true
      });

      // 自动注册并登录
      conn.open({
        user: username,
        pwd: password,
        success: function(userInfo) {
          isConnected = true;
          updateConnectionUI();
          addSystemMessage('🌐 已连接到聊天服务器（环信）');
          joinRoom(currentUser.room);
        },
        error: function(e) {
          // 如果用户不存在，自动注册
          if(e.type === 17) {
            registerAndLogin(username, password);
          } else {
            isConnected = false;
            updateConnectionUI();
            addSystemMessage('❌ 连接失败: ' + JSON.stringify(e));
          }
        }
      });
    }

    function registerAndLogin(username, password) {
      if(!conn) return;
      const options = { username, password, nickname: currentUser.nickname };
      conn.registerUser(options).then(() => {
        conn.open({ user: username, pwd: password });
      }).catch(e => {
        addSystemMessage('❌ 注册失败: ' + JSON.stringify(e));
      });
    }

    // 环信群组（房间）相关
    let currentGroupId = null;
    function joinRoom(roomName) {
      if(!conn || !isConnected) return;
      const groupId = roomName.replace(/\s/g, '') + '_room'; // 房间ID
      if(currentGroupId) {
        conn.leaveGroup({ groupId: currentGroupId });
      }
      currentGroupId = groupId;
      conn.joinGroup({ groupId }).then(() => {
        addSystemMessage('📌 进入房间「' + roomName + '」');
      }).catch(() => {
        // 可能群组不存在，创建后加入
        conn.createGroup({ groupId, groupName: roomName, description: '私聊房间', members: [] }).then(() => {
          conn.joinGroup({ groupId }).then(() => {
            addSystemMessage('📌 进入房间「' + roomName + '」');
          });
        }).catch(e => {
          addSystemMessage('⚠️ 进入房间失败: ' + JSON.stringify(e));
        });
      });
    }

    // 接收消息
    function setupMessageListener() {
      if(!conn) return;
      conn.listen({
        onTextMessage: function(msg) {
          const data = { id: msg.id, sender: msg.from, content: msg.data, type: 'text', timestamp: msg.time };
          const exists = messages.some(m => m.id === data.id);
          if(!exists) addMessage(data);
        },
        onCustomMessage: function(msg) {
          // 用于图片
          try {
            const custom = msg.customExts || {};
            const data = { id: msg.id, sender: msg.from, content: custom.content, type: custom.type || 'image', timestamp: msg.time, text: custom.text };
            if(!messages.some(m=>m.id===data.id)) addMessage(data);
          } catch(e) {}
        }
      });
    }

    // 发送文字消息
    function sendText(text) {
      if(!conn || !isConnected || !currentGroupId) return;
      const msg = new window.easemobIm.message.txt({
        msg: text,
        to: currentGroupId,
        chatType: 'groupChat'
      });
      conn.send(msg).then(() => {
        const localMsg = { id: msg.id, sender: currentUser.nickname, content: text, type: 'text', timestamp: Date.now() };
        addMessage(localMsg);
      }).catch(e => addSystemMessage('⚠️ 发送失败'));
    }

    // 发送图片（base64）
    function sendImage(base64, textNote) {
      if(!conn || !isConnected || !currentGroupId) return;
      const customMsg = new window.easemobIm.message.custom({
        customExts: { content: base64, type: 'image', text: textNote },
        to: currentGroupId,
        chatType: 'groupChat'
      });
      conn.send(customMsg).then(() => {
        addMessage({ id: customMsg.id, sender: currentUser.nickname, content: base64, type: 'image', timestamp: Date.now(), text: textNote });
      }).catch(e => addSystemMessage('⚠️ 图片发送失败'));
    }

    // ---------- 事件绑定 ----------
    sendBtn.addEventListener('click', () => {
      const text = messageInput.value.trim();
      if(!text) return;
      sendText(text);
      messageInput.value = '';
    });

    messageInput.addEventListener('keypress', e => { if(e.key==='Enter'){ e.preventDefault(); sendBtn.click(); } });

    imageInput.addEventListener('change', e => {
      const file = e.target.files[0];
      if(!file||!file.type.startsWith('image/')) return;
      const reader = new FileReader();
      reader.onload = ev => {
        sendImage(ev.target.result, '');
        addSystemMessage('📸 你发送了一张照片');
      };
      reader.readAsDataURL(file);
      imageInput.value = '';
    });

    joinRoomBtn.addEventListener('click', () => {
      currentUser.nickname = nicknameInput.value.trim()||'我';
      currentUser.room = roomInput.value.trim()||'cozy-room';
      currentRoomDisplay.textContent = currentUser.room;
      loadMessagesFromStorage(currentUser.room);
      renderMessages();
      if(conn && isConnected) joinRoom(currentUser.room);
      else addSystemMessage('⏳ 等待连接成功后加入房间...');
    });

    clearStorageBtn.addEventListener('click', () => {
      if(confirm('确定清除本房间记录？')) { messages=[]; saveMessagesToStorage(); renderMessages(); addSystemMessage('🧹 已清空'); }
    });

    // ---------- 启动 ----------
    function init() {
      currentUser.nickname = nicknameInput.value.trim()||'我';
      currentUser.room = roomInput.value.trim()||'cozy-room';
      currentRoomDisplay.textContent = currentUser.room;
      loadMessagesFromStorage(currentUser.room);
      renderMessages();
      updateConnectionUI();
      // 监听环信消息
      if(window.easemobIm) {
        connectEasemob();
        setupMessageListener();
      } else {
        addSystemMessage('❌ 环信 SDK 未加载，请检查网络或稍后刷新');
      }
    }

    init();
  })();
</script>
</body>
</html>
